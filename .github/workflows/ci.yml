name: CI

# Regression checks for the documentation. This repo is currently a design
# record (ADRs + agent docs), so "regressions" are broken links, a stale ADR
# index, malformed Markdown, and typos. Every tool is installed and run
# through mise (see mise.toml); each check is its own job so failures point
# straight at the thing that broke.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch external link rot even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Install mise-managed tools non-interactively when a task first needs them.
  MISE_YES: "1"

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run lint

  internal-links:
    name: Internal links & references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run links

  adr:
    name: ADR consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run adr

  spelling:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run spell

  tests:
    name: Script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run test

  external-links:
    name: External links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Check external links
        run: mise run external-links
        env:
          # lychee uses the token to check github.com links via the API
          # instead of scraping (avoids rate limits).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    # The e2e harness (spec #20 / T1): a real Linux environment with systemd
    # as PID 1, Caddy with its admin API, mise, and a loopback sshd wired to
    # exhibit-server as the SSH forced command.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Install Caddy (admin API on localhost:2019)
        run: |
          sudo apt-get update
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install -y caddy
          curl -fsS --retry 5 --retry-delay 1 --retry-all-errors http://127.0.0.1:2019/config/ > /dev/null

      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sudo MISE_INSTALL_PATH=/usr/local/bin/mise sh
          mise --version

      - name: Expose bun to root
        run: sudo ln -sf "$(which bun)" /usr/local/bin/bun

      - name: Configure loopback sshd with exhibit-server as forced command
        run: |
          sudo apt-get install -y openssh-server
          sudo mkdir -p /root/.ssh && sudo chmod 700 /root/.ssh
          sudo ssh-keygen -t ed25519 -N '' -f /root/.ssh/exhibit_e2e
          sudo tee /usr/local/bin/exhibit-server >/dev/null <<EOF
          #!/bin/sh
          export EXHIBIT_ROOT=/srv/exhibit-e2e
          export EXHIBIT_PORT_BASE=4500
          exec /usr/local/bin/bun $GITHUB_WORKSPACE/src/server/main.ts "\$@"
          EOF
          sudo chmod +x /usr/local/bin/exhibit-server
          echo "command=\"/usr/local/bin/exhibit-server\",restrict $(sudo cat /root/.ssh/exhibit_e2e.pub)" | sudo tee -a /root/.ssh/authorized_keys >/dev/null
          sudo chmod 600 /root/.ssh/authorized_keys
          sudo tee /root/.ssh/config >/dev/null <<EOF
          Host exhibit-e2e
            HostName 127.0.0.1
            User root
            IdentityFile /root/.ssh/exhibit_e2e
            StrictHostKeyChecking accept-new
          EOF
          echo "PermitRootLogin prohibit-password" | sudo tee /etc/ssh/sshd_config.d/99-exhibit.conf >/dev/null
          sudo systemctl restart ssh

      - name: Tests (unit + e2e)
        run: sudo -E env "PATH=$PATH" EXHIBIT_E2E=1 EXHIBIT_SSH_E2E=1 bun test --timeout 120000
