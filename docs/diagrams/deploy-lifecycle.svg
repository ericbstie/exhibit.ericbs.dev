<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 420" font-family="ui-sans-serif,system-ui,sans-serif">
<defs>
<marker id="ah-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#343a40"/></marker>
<marker id="ah-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e03131"/></marker>
</defs>
<rect width="1460" height="420" fill="#ffffff"/>
<rect x="40" y="120" width="240" height="110" rx="10" fill="#e5dbff" stroke="#6741d9" stroke-width="2"/>
<text x="160.0" y="163.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">1 · register app</text>
<text x="160.0" y="183.0" font-size="12.5" fill="#343a40" text-anchor="middle">ex daemon stores app,</text>
<text x="160.0" y="200.0" font-size="12.5" fill="#343a40" text-anchor="middle">domain, run command</text>
<rect x="330" y="120" width="250" height="110" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
<text x="455.0" y="163.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">2 · sandbox</text>
<text x="455.0" y="183.0" font-size="12.5" fill="#343a40" text-anchor="middle">create user + systemd unit</text>
<text x="455.0" y="200.0" font-size="12.5" fill="#343a40" text-anchor="middle">(fallback: bwrap)</text>
<rect x="630" y="120" width="250" height="110" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
<text x="755.0" y="163.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">3 · start app</text>
<text x="755.0" y="183.0" font-size="12.5" fill="#343a40" text-anchor="middle">run command starts,</text>
<text x="755.0" y="200.0" font-size="12.5" fill="#343a40" text-anchor="middle">serves on unix socket</text>
<rect x="930" y="120" width="240" height="110" rx="10" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
<text x="1050.0" y="163.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">4 · wire ingress</text>
<text x="1050.0" y="183.0" font-size="12.5" fill="#343a40" text-anchor="middle">Caddy route via</text>
<text x="1050.0" y="200.0" font-size="12.5" fill="#343a40" text-anchor="middle">admin API POST /load</text>
<rect x="1220" y="120" width="200" height="110" rx="10" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
<text x="1320.0" y="163.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">5 · DNS + TLS</text>
<text x="1320.0" y="183.0" font-size="12.5" fill="#343a40" text-anchor="middle">libdns record,</text>
<text x="1320.0" y="200.0" font-size="12.5" fill="#343a40" text-anchor="middle">cert on first hit</text>
<polyline points="280,175.0 330,175.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<polyline points="580,175.0 630,175.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<polyline points="880,175.0 930,175.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<polyline points="1170,175.0 1220,175.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<text x="40" y="50" font-size="18" font-weight="700" fill="#343a40">ex deploy --domain blog.ericbs.dev -- mise run production</text>
<text x="40" y="300" font-size="15" font-weight="700" fill="#2f9e44">curl https://blog.ericbs.dev → 200 OK   (seconds later, no Docker anywhere)</text>
</svg>