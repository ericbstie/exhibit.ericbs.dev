<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="ui-sans-serif,system-ui,sans-serif">
<defs>
<marker id="ah-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#343a40"/></marker>
<marker id="ah-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e03131"/></marker>
</defs>
<rect width="1400" height="700" fill="#ffffff"/>
<rect x="60" y="120" width="350" height="300" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
<text x="235.0" y="224.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">app sandbox · blog</text>
<text x="235.0" y="244.0" font-size="12.5" fill="#343a40" text-anchor="middle">env:</text>
<text x="235.0" y="261.0" font-size="12.5" fill="#343a40" text-anchor="middle">API_KEY=exhibit:placeholder</text>
<text x="235.0" y="278.0" font-size="12.5" fill="#343a40" text-anchor="middle">HTTP(S)_PROXY=127.0.0.1:9911</text>
<text x="235.0" y="295.0" font-size="12.5" fill="#343a40" text-anchor="middle"></text>
<text x="235.0" y="312.0" font-size="12.5" fill="#343a40" text-anchor="middle">no inet sockets — the proxy</text>
<text x="235.0" y="329.0" font-size="12.5" fill="#343a40" text-anchor="middle">socket is the only way out</text>
<rect x="490" y="250" width="170" height="70" rx="10" fill="#f1f3f5" stroke="#495057" stroke-width="2"/>
<text x="575.0" y="273.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">unix socket</text>
<text x="575.0" y="293.0" font-size="12.5" fill="#343a40" text-anchor="middle">/run/exhibit/</text>
<text x="575.0" y="310.0" font-size="12.5" fill="#343a40" text-anchor="middle">blog/proxy.sock</text>
<rect x="700" y="120" width="380" height="300" rx="10" fill="#ffe8cc" stroke="#e8590c" stroke-width="2"/>
<text x="890.0" y="241.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">egress proxy (per app)</text>
<text x="890.0" y="261.0" font-size="12.5" fill="#343a40" text-anchor="middle">1  host in allowlist?</text>
<text x="890.0" y="278.0" font-size="12.5" fill="#343a40" text-anchor="middle">2  SSRF guard (no private IPs)</text>
<text x="890.0" y="295.0" font-size="12.5" fill="#343a40" text-anchor="middle">3  swap placeholder → real secret</text>
<text x="890.0" y="312.0" font-size="12.5" fill="#343a40" text-anchor="middle">4  append audit log entry</text>
<rect x="1150" y="140" width="210" height="90" rx="10" fill="#f1f3f5" stroke="#495057" stroke-width="2"/>
<text x="1255.0" y="190.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">api.company.com</text>
<rect x="1150" y="330" width="210" height="90" rx="10" fill="#ffe3e3" stroke="#e03131" stroke-width="2"/>
<text x="1255.0" y="380.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">evil.example.com</text>
<rect x="700" y="490" width="380" height="130" rx="10" fill="#fff3bf" stroke="#f08c00" stroke-width="2"/>
<text x="890.0" y="543.0" font-size="15" font-weight="700" fill="#1e1e1e" text-anchor="middle">audit log (JSONL)</text>
<text x="890.0" y="563.0" font-size="12.5" font-family="ui-monospace,monospace" fill="#343a40" text-anchor="middle">{&quot;host&quot;:&quot;api.company.com&quot;,&quot;verdict&quot;:&quot;ALLOW+INJECT&quot;}</text>
<text x="890.0" y="580.0" font-size="12.5" font-family="ui-monospace,monospace" fill="#343a40" text-anchor="middle">{&quot;host&quot;:&quot;evil.example.com&quot;,&quot;verdict&quot;:&quot;DENY&quot;}</text>
<polyline points="410,270.0 490,285.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<text x="450.0" y="251.5" font-size="12" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" text-anchor="middle">GET api.company.com</text>
<text x="450.0" y="251.5" font-size="12" fill="#343a40" text-anchor="middle">GET api.company.com</text>
<polyline points="660,285.0 700,270.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<polyline points="1080,190.0 1150,185.0" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<text x="1115.0" y="173.5" font-size="12" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" text-anchor="middle">+ Bearer &lt;real&gt;</text>
<text x="1115.0" y="173.5" font-size="12" fill="#343a40" text-anchor="middle">+ Bearer &lt;real&gt;</text>
<polyline points="1080,350.0 1150,375.0" fill="none" stroke="#e03131" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-red)" stroke-dasharray="7 5"/>
<text x="1115.0" y="384.5" font-size="12" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" text-anchor="middle">403</text>
<text x="1115.0" y="384.5" font-size="12" fill="#e03131" text-anchor="middle">403</text>
<polyline points="890.0,420 890.0,490" fill="none" stroke="#343a40" stroke-width="1.8" stroke-linejoin="round" marker-end="url(#ah-ink)"/>
<text x="60" y="60" font-size="17" font-weight="700" fill="#343a40">The app never holds a secret — and cannot reach anything you did not allow.</text>
<text x="60" y="480" font-size="14" font-weight="700" fill="#6741d9">secrets live only in the ex daemon;</text>
<text x="60" y="505" font-size="14" font-weight="700" fill="#6741d9">a compromised app can leak nothing</text>
<text x="60" y="530" font-size="14" font-weight="700" fill="#6741d9">and every call it makes is on record</text>
</svg>